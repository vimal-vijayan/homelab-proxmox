name: gateway-namespace
apiVersion: v1
kind: Namespace
metadata:
  name: gateway-namespace
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: internet-gateway
  namespace: gateway-namespace
spec:
  gatewayClassName: traefik
  listeners:
    - name: internet-http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: All