---
all:
  vars:
    ansible_user: ubuntu
    ansible_ssh_private_key_file: ~/.ssh/id_rsa
    ansible_python_interpreter: /usr/bin/python3

  children:
    mgmt:
      hosts:
        tailscale-router:
          ansible_host: 10.10.99.10      # static IP — used after setup-hosts.yml
          bootstrap_host: 192.168.178.X  # replace with DHCP IP from Proxmox console
          static_ip: "10.10.99.10/24"
          hostname: "tailscale-router"
