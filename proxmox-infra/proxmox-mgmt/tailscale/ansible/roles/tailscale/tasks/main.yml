---
- name: Install curl and apt-transport-https
  ansible.builtin.apt:
    name:
      - curl
      - apt-transport-https
    state: present
    update_cache: true

- name: Add Tailscale GPG key
  ansible.builtin.shell: >
    curl -fsSL https://pkgs.tailscale.com/stable/ubuntu/noble.noarmor.gpg
    | tee /usr/share/keyrings/tailscale-archive-keyring.gpg >/dev/null
  args:
    creates: /usr/share/keyrings/tailscale-archive-keyring.gpg

- name: Add Tailscale apt repository
  ansible.builtin.shell: >
    curl -fsSL https://pkgs.tailscale.com/stable/ubuntu/noble.tailscale-keyring.list
    | tee /etc/apt/sources.list.d/tailscale.list
  args:
    creates: /etc/apt/sources.list.d/tailscale.list

- name: Install Tailscale
  ansible.builtin.apt:
    name: tailscale
    state: present
    update_cache: true

- name: Enable and start tailscaled service
  ansible.builtin.systemd:
    name: tailscaled
    state: started
    enabled: true

- name: Enable IPv4 forwarding
  ansible.posix.sysctl:
    name: net.ipv4.ip_forward
    value: "1"
    sysctl_file: /etc/sysctl.d/99-tailscale.conf
    reload: true

- name: Enable IPv6 forwarding
  ansible.posix.sysctl:
    name: net.ipv6.conf.all.forwarding
    value: "1"
    sysctl_file: /etc/sysctl.d/99-tailscale.conf
    reload: true

- name: Authenticate and advertise subnet routes
  ansible.builtin.command: >
    tailscale up
    --authkey={{ tailscale_auth_key }}
    --advertise-routes={{ tailscale_advertise_routes | join(',') }}
    --accept-routes
  register: tailscale_up
  changed_when: tailscale_up.rc == 0
  no_log: true

- name: Verify Tailscale is connected
  ansible.builtin.command: tailscale status
  register: tailscale_status
  changed_when: false

- name: Show Tailscale status
  ansible.builtin.debug:
    msg: "{{ tailscale_status.stdout_lines }}"
