---
- name: Configure hostname and static IP for all cluster nodes
  hosts: k3s_cluster
  become: true
  vars:
    network_interface: ens18
    gateway: "10.50.10.1"
    dns_server: "10.50.10.1"

  tasks:
    - name: Set hostname
      ansible.builtin.hostname:
        name: "{{ hostname }}"

    - name: Update /etc/hosts with new hostname
      ansible.builtin.lineinfile:
        path: /etc/hosts
        regexp: '^127\.0\.1\.1'
        line: "127.0.1.1 {{ hostname }}"

    - name: Write netplan static IP config
      ansible.builtin.copy:
        dest: /etc/netplan/99-static.yaml
        content: |
          network:
            version: 2
            ethernets:
              {{ network_interface }}:
                dhcp4: false
                addresses:
                  - {{ static_ip }}
                routes:
                  - to: default
                    via: {{ gateway }}
                nameservers:
                  addresses:
                    - {{ dns_server }}
        owner: root
        group: root
        mode: "0600"

    - name: Disable any existing DHCP netplan configs for ens18
      ansible.builtin.shell: |
        for f in /etc/netplan/*.yaml /etc/netplan/*.yml; do
          [ "$f" = "/etc/netplan/99-static.yaml" ] && continue
          if grep -q "{{ network_interface }}" "$f" 2>/dev/null; then
            mv "$f" "${f}.disabled"
          fi
        done
      args:
        executable: /bin/bash
      changed_when: false

    - name: Apply netplan configuration
      ansible.builtin.command: netplan apply
      # Connection will drop briefly as IP changes — this is expected
      async: 10
      poll: 0
      changed_when: true

    - name: Disable ufw firewall
      ansible.builtin.systemd:
        name: ufw
        state: stopped
        enabled: false
      ignore_errors: true

    - name: Reset ufw rules to allow all traffic
      ansible.builtin.command: ufw reset
      args:
        creates: /etc/ufw/ufw.conf.disabled
      ignore_errors: true
